<!DOCTYPE html>
<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MEDIA_CORE_V1 | Login</title>
<meta name="stitch-api-key" content="STITCH_API_KEY_PLACEHOLDER"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tw-config">
tailwind.config={darkMode:"class",theme:{extend:{
 colors:{surface:"#131313",surfaceContainerLowest:"#0e0e0e",surfaceVariant:"#353534",surfaceContainerLow:"#1c1b1b",
  onSurface:"#e5e2e1",onSurfaceVariant:"#b9cacb",primary:"#dbfcff",primaryContainer:"#00f0ff",onPrimaryContainer:"#00363a",
  secondaryContainer:"#7000ff",outlineVariant:"#3b494b",error:"#ffb4ab",errorContainer:"#93000a"},
 fontFamily:{body:["Inter"],mono:["JetBrains Mono"]}}}}
</script>
<style>
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400;vertical-align:middle}
body{background:#131313;color:#e5e2e1;font-family:Inter,sans-serif;margin:0}
.glass{background:rgba(19,19,19,.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);box-shadow:0 0 40px rgba(0,240,255,.05)}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}.animate-pulse-2{animation:pulse 4s infinite}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}.shake{animation:shake .4s}
</style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden">
<div class="fixed inset-0 z-0 pointer-events-none"><div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primaryContainer/5 rounded-full blur-[120px] animate-pulse-2"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondaryContainer/5 rounded-full blur-[120px]"></div>
<div class="absolute inset-0 opacity-[0.03]" style="background-image:radial-gradient(#dbfcff 1px,transparent 1px);background-size:32px 32px"></div></div>

<main class="relative z-10 w-full max-w-md px-6">
<div class="text-center mb-8"><h1 class="text-2xl font-bold text-primary tracking-tighter">MEDIA_CORE_V1</h1>
<p class="text-xs text-onSurfaceVariant tracking-widest uppercase mt-1">Servidor de Mídia de Alta Performance</p></div>
<div class="glass p-8 rounded-xl">
<form id="login-form" class="space-y-6" onsubmit="return false">
<div class="space-y-2">
<label class="block text-xs text-onSurfaceVariant font-mono ml-1">SENHA DO SISTEMA</label>
<div class="relative"><span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-onSurfaceVariant">lock</span>
<input id="password" type="password" placeholder="••••••••" class="w-full bg-surfaceContainerLow border border-white/10 rounded-lg py-4 pl-12 pr-4 text-onSurface font-mono focus:outline-none focus:border-primaryContainer transition-all"/></div>
<p id="err" class="text-error font-mono text-xs hidden ml-1"></p>
</div>
<button id="submit-btn" onclick="doLogin()" class="w-full bg-primaryContainer text-onPrimaryContainer font-bold py-4 rounded-lg flex items-center justify-center gap-2 hover:brightness-110 active:scale-95 transition-all">
<span id="btn-text">ACESSAR TERMINAL</span><span class="material-symbols-outlined">arrow_forward</span></button>
</form>
<div class="mt-6 text-center"><div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-surfaceContainerLow/50 border border-white/5">
<span class="material-symbols-outlined text-sm text-primary">sensors</span>
<p class="text-xs text-onSurfaceVariant font-mono">ACESSO API HEADLESS: header X-API-Key</p></div></div>
</div>
<p class="text-center mt-6 text-xs text-onSurfaceVariant/40 font-mono">© 2024 MEDIA_CORE. v2.4.1-stable</p>
</main>

<script>
(async function(){
  try{ const me=await fetch('/api/me',{credentials:'include'}); if(me.ok) location.href='/'; }catch(e){}
})();
async function doLogin(){
  const pw=document.getElementById('password').value, btn=document.getElementById('submit-btn'),
    bt=document.getElementById('btn-text'), err=document.getElementById('err');
  if(!pw){err.textContent='Informe a senha.';err.classList.remove('hidden');return;}
  bt.textContent='AUTENTICANDO...'; btn.disabled=true; err.classList.add('hidden');
  try{ const f=new FormData(); f.append('password',pw);
    const r=await fetch('/login',{method:'POST',body:f,credentials:'include'}); const d=await r.json();
    if(r.ok&&d.status==='success'){ location.href='/'; }
    else{ err.textContent=d.detail||'Senha incorreta.'; err.classList.remove('hidden');
      document.getElementById('password').classList.add('shake'); setTimeout(()=>document.getElementById('password').classList.remove('shake'),400);
      document.getElementById('password').value=''; }
  }catch(e){ err.textContent='Erro: '+e.message; err.classList.remove('hidden'); }
  finally{ bt.textContent='ACESSAR TERMINAL'; btn.disabled=false; }
}
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body></html>
