<!DOCTYPE html>
<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sleek Media Downloader | Secure Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
    .glass-panel { background: rgba(19, 19, 19, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    .neon-glow { box-shadow: 0 0 20px rgba(0, 240, 255, 0.15); }
</style>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "surface": "#131313", "background": "#131313", "on-surface": "#e5e2e1",
                    "primary": "#00f0ff", "primary-container": "#00f0ff", "on-primary": "#00363a",
                    "secondary": "#d1bcff", "secondary-container": "#7000ff", "on-secondary": "#3c0090",
                    "tertiary": "#dcffe2", "tertiary-container": "#00f990", "on-tertiary": "#00391d",
                    "surface-container": "#201f1f", "surface-container-high": "#2a2a2a",
                    "surface-variant": "#353534", "on-surface-variant": "#b9cacb",
                    "outline": "#849495"
                },
                "borderRadius": { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem" },
                "fontFamily": { "headline": ["Inter"], "body": ["Inter"], "stats": ["JetBrains Mono"] }
            },
        },
    }
</script>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex items-center justify-center p-6 selection:bg-primary selection:text-on-primary">
    <div class="w-full max-w-md glass-panel p-10 rounded-3xl neon-glow relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-secondary to-tertiary"></div>
        
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_20px_rgba(0,240,255,0.4)]">
                <span class="material-symbols-outlined text-on-primary text-3xl">lock</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tighter text-on-surface mb-2">Sleek Access</h1>
            <p class="text-on-surface-variant text-sm">Autenticação de Administrador do Node</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div class="space-y-2">
                <label class="text-xs font-stats text-on-surface-variant uppercase tracking-widest ml-1">Passphrase</label>
                <div class="relative">
                    <input id="password" type="password" class="w-full bg-surface-container-high border-white/5 rounded-xl pl-4 pr-12 py-4 text-on-surface focus:ring-2 focus:ring-primary transition-all placeholder:text-on-surface-variant/40" placeholder="••••••••••••" required/>
                    <button type="button" id="toggle-pass" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors">
                        <span class="material-symbols-outlined text-sm" id="eye-icon">visibility</span>
                    </button>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <input id="remember-me" type="checkbox" class="rounded border-white/10 bg-surface-container-high text-primary focus:ring-primary">
                <label for="remember-me" class="text-xs text-on-surface-variant cursor-pointer hover:text-on-surface transition-colors">Manter sessão ativa no navegador</label>
            </div>

            <button type="submit" class="w-full py-4 bg-primary text-on-primary font-bold rounded-xl hover:brightness-110 active:scale-95 transition-all neon-glow flex items-center justify-center gap-2">
                AUTENTICAR <span class="material-symbols-outlined">login</span>
            </button>
        </form>
    </div>

    <script>
        const passInput = document.getElementById('password');
        const toggleBtn = document.getElementById('toggle-pass');
        const eyeIcon = document.getElementById('eye-icon');

        toggleBtn.onclick = () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            eyeIcon.textContent = isPass ? 'visibility_off' : 'visibility';
        };

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const password = passInput.value;
            const remember = document.getElementById('remember-me').checked;

            try {
                const r = await fetch('/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (r.ok) {
                    if (remember) localStorage.setItem('remember_session', 'true');
                    window.location.href = '/dashboard';
                } else {
                    alert('Senha incorreta. Acesso negados.');
                }
            } catch(err) {
                alert('Erro de conexão com o servidor.');
            }
        };

        window.onload = () => {
            if (localStorage.getItem('remember_session') === 'true') {
                // O backend ainda valida o cookie, mas podemos pré-encher ou tentar auto-login se tivéssemos o token salvo.
            }
        };
    </script>
</body></html>
