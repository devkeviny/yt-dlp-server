<body class="flex items-center justify-center min-h-screen text-on-surface">

<!-- Background dot grid -->
<div class="fixed inset-0 z-0 opacity-20 pointer-events-none">
<div class="absolute top-0 left-0 w-full h-full" style="background-image: radial-gradient(#2d3449 1px, transparent 1px); background-size: 24px 24px;"></div>
</div>

<!-- Login Container -->
<main class="relative z-10 w-full max-w-md px-container-padding">
<!-- Login Card -->
<div class="login-card p-stack-lg rounded-xl shadow-2xl technical-glow">
<!-- Branding -->
<div class="flex flex-col items-center mb-stack-lg">
<div class="w-16 h-16 bg-surface-container-high flex items-center justify-center rounded-lg mb-stack-md border border-outline-variant">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1, 'wght' 400;">download</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary">yt-dlp Server</h1>
<p class="font-code-label text-code-label text-on-surface-variant mt-unit">SISTEMA DE DOWNLOAD</p>
</div>

<!-- Login Form -->
<form id="login-form" class="space-y-stack-md" onsubmit="return false;">
<div class="space-y-unit">
<label class="block font-body-sm text-body-sm text-on-surface-variant ml-unit" for="password">
    Senha de Acesso
</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-stack-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-stack-md pl-12 pr-stack-md text-on-surface font-code-label text-code-label focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200"
    id="password" name="password" placeholder="••••••••" type="password" autocomplete="current-password"/>
</div>
<!-- Error message -->
<p id="error-msg" class="text-error font-code-label text-code-label hidden ml-unit"></p>
</div>

<!-- Submit Button -->
<button id="submit-btn" onclick="doLogin()"
    class="w-full bg-primary-container hover:brightness-110 active:opacity-80 text-on-primary-container py-stack-md px-stack-lg rounded-lg font-title-sm text-title-sm flex items-center justify-center gap-stack-sm transition-all duration-200">
<span id="btn-text">Entrar</span>
<span class="material-symbols-outlined text-[20px]">login</span>
</button>
</form>

<!-- Status row (aesthetic) -->
<div class="mt-stack-lg pt-stack-md border-t border-outline-variant grid grid-cols-3 gap-unit">
<div class="flex flex-col items-center">
<span class="font-code-label text-code-label text-secondary">ATIVO</span>
<span class="text-[10px] text-on-surface-variant uppercase tracking-widest">Status</span>
</div>
<div class="flex flex-col items-center border-x border-outline-variant">
<span class="font-code-label text-code-label text-primary" id="login-latency">--</span>
<span class="text-[10px] text-on-surface-variant uppercase tracking-widest">Latência</span>
</div>
<div class="flex flex-col items-center">
<span class="font-code-label text-code-label text-primary">TLS</span>
<span class="text-[10px] text-on-surface-variant uppercase tracking-widest">Segurança</span>
</div>
</div>
</div>
<!-- Footer -->
<p class="text-center mt-stack-lg font-body-sm text-body-sm text-on-surface-variant opacity-50">
    yt-dlp Server &copy; 2024
</p>
</main>

<script>
    // If already authenticated, go to dashboard
    try {
        const me = await fetch('/api/me', { credentials: 'include' });
        if (me.ok) { window.location.href = '/static/index.html'; }
    } catch (e) {}
    }

    // Measure latency on load
    (async function() {
        const t0 = performance.now();
        try {
            await fetch('/test-health', { method: 'GET' });
            const ms = (performance.now() - t0).toFixed(1);
            document.getElementById('login-latency').textContent = ms + 'ms';
        } catch(e) {
            document.getElementById('login-latency').textContent = 'ERR';
        }
    })();

    async function doLogin() {
        const pw = document.getElementById('password').value;
        const btn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const errMsg = document.getElementById('error-msg');

        if (!pw) {
            errMsg.textContent = 'Informe a senha.';
            errMsg.classList.remove('hidden');
            document.getElementById('password').classList.add('shake');
            setTimeout(() => document.getElementById('password').classList.remove('shake'), 400);
            return;
        }

        btnText.textContent = 'Autenticando...';
        btn.disabled = true;
        btn.classList.add('opacity-80', 'cursor-not-allowed');
        errMsg.classList.add('hidden');

        try {
            const form = new FormData();
            form.append('password', pw);
            const resp = await fetch('/login', { method: 'POST', body: form });
            const data = await resp.json();

            if (resp.ok && data.status === 'success') {
                // Cookie is set by server (httponly), redirect
                window.location.href = '/static/index.html';
            } else {
                errMsg.textContent = data.detail || 'Senha incorreta.';
                errMsg.classList.remove('hidden');
                document.getElementById('password').classList.add('shake');
                setTimeout(() => document.getElementById('password').classList.remove('shake'), 400);
                document.getElementById('password').value = '';
            }
        } catch(e) {
            errMsg.textContent = 'Erro de conexão: ' + e.message;
            errMsg.classList.remove('hidden');
        } finally {
            btnText.textContent = 'Entrar';
            btn.disabled = false;
            btn.classList.remove('opacity-80', 'cursor-not-allowed');
        }
    }

    // Enter key
    document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
    });

    // Stitch Design System (silencioso no login: só queremos CSS vars corretas)
    StitchTheme.init({ projectId: '15410152418051530362' }).catch(() => {});
</script>
