<!DOCTYPE html>
<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lulu Converter | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
.glass-card{background:rgba(19,19,19,0.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);box-shadow:0 0 40px rgba(255,105,180,0.08)}
.neon-glow:focus{box-shadow:0 0 20px rgba(255,105,180,0.3);border-color:#ff69b4}
@keyframes pulse-pink{0%{opacity:0.4}50%{opacity:0.8}100%{opacity:0.4}}
.animate-pulse-pink{animation:pulse-pink 4s ease-in-out infinite}
body::-webkit-scrollbar{width:0}body{scrollbar-width:none}
</style>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{
"surface-container-low":"#1c1b1b","surface-container-lowest":"#0e0e0e","surface-dim":"#131313",
"on-surface":"#e5e2e1","background":"#131313","surface":"#131313",
"primary":"#ffb6c1","primary-container":"#ff69b4","on-primary-container":"#5c0033",
"on-primary-fixed":"#3a0020","primary-fixed-dim":"#ff1493","on-surface-variant":"#b9cacb",
"secondary-container":"#c71585"
}}}}</script>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body-md min-h-screen flex flex-col items-center justify-center overflow-hidden">
<div class="fixed inset-0 z-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary-container/10 rounded-full blur-[120px] animate-pulse-pink"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute inset-0 opacity-[0.03]" style="background-image:radial-gradient(#ff69b4 1px,transparent 1px);background-size:32px 32px"></div>
</div>
<main class="relative z-10 w-full max-w-md px-6 md:px-0">
<div class="text-center mb-12">
<div class="flex justify-center mb-4"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='20' fill='%23ff69b4'/%3E%3Ctext x='20' y='27' text-anchor='middle' font-size='24'%3E%F0%9F%90%B1%3C/text%3E%3C/svg%3E" alt="Lulu" class="w-20 h-20 rounded-full shadow-[0_0_25px_rgba(255,105,180,0.4)]"/></div>
<h1 class="text-3xl md:text-4xl font-bold text-primary tracking-tighter mb-2">Lulu Converter</h1>
<p class="text-xs text-on-surface-variant/60 tracking-widest uppercase">Conversor de Mídia de Alta Performance</p>
</div>
<div class="glass-card p-6 md:p-8 rounded-xl">
<form class="space-y-6" id="loginForm">
<div class="space-y-2">
<label class="text-xs text-on-surface-variant block ml-1">SENHA DO SISTEMA</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 group-focus-within:text-primary-container transition-colors">lock</span>
<input class="w-full bg-surface-variant/20 border border-white/5 rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/20 focus:outline-none neon-glow transition-all font-mono" id="password" placeholder="••••••••" required type="password"/>
</div>
</div>
<button class="w-full bg-primary-container text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all group" type="submit" id="loginBtn">
<span>ACESSAR</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<div id="loginError" class="hidden text-error text-xs text-center mt-2"></div>
</form>
</div>
</main>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn'); const pw = document.getElementById('password').value;
    const err = document.getElementById('loginError'); btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> AUTENTICANDO...'; err.classList.add('hidden');
    try {
        const r = await fetch('/auth', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
        if(r.ok) window.location.href='/dashboard';
        else { err.textContent='Senha Incorreta'; err.classList.remove('hidden'); }
    } catch(e) { err.textContent='Erro de conexão'; err.classList.remove('hidden'); }
    finally { btn.disabled=false; btn.innerHTML='ACESSAR <span class="material-symbols-outlined">arrow_forward</span>'; }
});
</script>
</body></html>
