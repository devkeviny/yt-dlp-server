<!DOCTYPE html>
<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lulu Downloader</title>
<meta name="stitch-api-key" content="STITCH_API_KEY_PLACEHOLDER"/>
<link rel="stylesheet" href="/static/brand.css"/>
<script src="/static/brand.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tw-config">
tailwind.config = { darkMode:"class", theme:{ extend:{
  colors:{ surface:"#131313", surfaceVariant:"#353534", surfaceContainer:"#201f1f", surfaceContainerLow:"#1c1b1b",
    surfaceContainerLowest:"#0e0e0e", onSurface:"#e5e2e1", onSurfaceVariant:"#b9cacb", primary:"#dbfcff",
    primaryContainer:"#00f0ff", onPrimaryContainer:"#00363a", secondaryContainer:"#7000ff", tertiaryContainer:"#00f990",
    outline:"#849495", outlineVariant:"#3b494b", error:"#ffb4ab", errorContainer:"#93000a" },
  fontFamily:{ body:["Inter"], mono:["JetBrains Mono"] },
  spacing:{ gutter:"24px", marginDesktop:"64px", stackMd:"16px", stackXl:"48px" }
}}}
</script>
<style>
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400;vertical-align:middle}
.glass{background:rgba(19,19,19,.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08)}
body{background:#131313;color:#e5e2e1;font-family:Inter,sans-serif;margin:0}
.cyan-glow{box-shadow:0 0 20px rgba(0,240,255,.15)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.animate-pulse-2{animation:pulse 2s infinite}
.custom-scroll::-webkit-scrollbar{width:5px}
.custom-scroll::-webkit-scrollbar-thumb{background:#3b494b;border-radius:3px}
#toast{transition:opacity .3s}
@keyframes spin{to{transform:rotate(360deg)}}
.animate-spin{animation:spin 1s linear infinite}
.progress-bar{transition:width .4s ease}
</style>
</head>
<body class="min-h-screen">
<script>
(async function(){ try{ const me=await fetch('/api/me',{credentials:'include'}); if(!me.ok) location.href='/login'; }catch(e){ location.href='/login'; } })();
</script>

<!-- TopNav -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 lg:px-16 h-20 bg-surface/60 backdrop-blur-md border-b border-white/10">
<span id="logo"></span>
<nav class="hidden md:flex gap-8">
<a class="text-onSurfaceVariant hover:text-primary cursor-pointer border-b-2 border-primary pb-1 text-primary">Conversor</a>
<a class="text-onSurfaceVariant hover:text-primary cursor-pointer" href="/transfers">Histórico</a>
<a class="text-onSurfaceVariant hover:text-primary cursor-pointer" href="/storage">Armazenamento</a>
<a class="text-onSurfaceVariant hover:text-primary cursor-pointer" href="/system">Sistema</a>
</nav>
<div class="flex items-center gap-4">
<div id="net-pill" class="hidden md:flex gap-3 font-mono text-xs text-primary bg-surfaceContainerLow px-4 py-2 rounded-full border border-white/10">
<span id="net-down">↓ 0 B/s</span><span id="net-up">↑ 0 B/s</span>
</div>
<button onclick="logout()" class="material-symbols-outlined text-onSurfaceVariant hover:text-primary">logout</button>
</div>
</header>

<!-- SideNav -->
<aside class="fixed left-0 top-0 h-full pt-24 flex flex-col bg-surfaceContainerLowest/80 backdrop-blur-xl border-r border-white/10 w-64 hidden lg:flex">
<div class="px-6 pb-6"><span id="logo-side"></span></div>
<nav class="flex-1 px-4 space-y-2">
<a class="flex items-center gap-4 px-4 py-3 rounded-lg bg-primaryContainer/20 text-primary border-r-4 border-primary" href="/"><span class="material-symbols-outlined">download</span><span class="text-sm">Conversor</span></a>
<a class="flex items-center gap-4 px-4 py-3 rounded-lg text-onSurfaceVariant hover:bg-surfaceVariant/30" href="/transfers"><span class="material-symbols-outlined">history</span><span class="text-sm">Histórico</span></a>
<a class="flex items-center gap-4 px-4 py-3 rounded-lg text-onSurfaceVariant hover:bg-surfaceVariant/30" href="/storage"><span class="material-symbols-outlined">database</span><span class="text-sm">Armazenamento</span></a>
<a class="flex items-center gap-4 px-4 py-3 rounded-lg text-onSurfaceVariant hover:bg-surfaceVariant/30" href="/system"><span class="material-symbols-outlined">settings</span><span class="text-sm">Sistema</span></a>
</nav>
<div class="p-4"><button onclick="logout()" class="w-full py-3 bg-primaryContainer text-onPrimaryContainer font-bold rounded-xl active:scale-95 transition-all flex items-center justify-center gap-2"><span class="material-symbols-outlined">logout</span>Sair</button></div>
</aside>

<!-- Main -->
<main class="lg:pl-64 pt-24 pb-16 px-6 max-w-7xl mx-auto">
<div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
<!-- Left: converter -->
<section class="xl:col-span-1 space-y-6">
<div class="glass p-6 rounded-2xl">
<h3 class="text-primary flex items-center gap-2 mb-4"><span class="material-symbols-outlined">download</span> Baixar & Converter</h3>
<div class="space-y-4">
<input id="url-input" class="w-full bg-surfaceContainerLowest border border-white/10 rounded-lg px-4 py-3 text-onSurface font-mono text-sm focus:border-primaryContainer outline-none" placeholder="Cole a URL (YouTube, TikTok, Instagram...)"/>
<!-- formato -->
<div class="grid grid-cols-2 gap-2 bg-surfaceContainerLowest p-1 rounded-lg">
<button id="btn-mp4" onclick="selectFmt('mp4')" class="py-2 bg-primaryContainer text-onPrimaryContainer font-bold rounded text-sm">MP4 VÍDEO</button>
<button id="btn-mp3" onclick="selectFmt('mp3')" class="py-2 text-onSurfaceVariant rounded text-sm">MP3 ÁUDIO</button>
</div>
<!-- qualidade dinamica -->
<div id="quality-wrap" class="bg-surfaceContainerLowest rounded-lg p-1 hidden">
<select id="quality" class="w-full bg-transparent text-onSurface text-sm py-2 px-2 rounded outline-none"></select>
</div>
<!-- processo -->
<div id="progress" class="hidden">
<div class="flex items-center gap-3 mb-2"><span id="prog-icon" class="material-symbols-outlined text-primary animate-spin">sync</span><span id="prog-text" class="text-sm text-onSurface">Processando...</span></div>
<div class="w-full h-2 bg-surfaceContainerLowest rounded-full overflow-hidden"><div id="prog-bar" class="h-full bg-primaryContainer progress-bar" style="width:30%"></div></div>
</div>
<button onclick="startDownload()" id="dl-btn" class="w-full py-4 bg-primaryContainer text-onPrimaryContainer font-bold rounded-lg shadow cyan-glow hover:brightness-110 transition-all flex items-center justify-center gap-2"><span class="material-symbols-outlined">download</span> BAIXAR AGORA</button>
<div class="flex items-center gap-2 text-xs text-onSurfaceVariant"><input type="checkbox" id="chk-transcript" class="accent-primaryContainer"/> <label for="chk-transcript">Verificar legenda/transcrição disponível</label></div>
<div id="transcript-info" class="hidden text-xs text-tertiaryContainer font-mono">Transcrição: <span id="tr-lang"></span> ✓</div>
</div>
</div>
<div class="grid grid-cols-3 gap-3">
<div class="glass p-4 rounded-xl text-center"><div class="text-[10px] text-onSurfaceVariant uppercase">CPU</div><div id="stat-cpu" class="text-lg font-bold text-primary font-mono">--</div></div>
<div class="glass p-4 rounded-xl text-center"><div class="text-[10px] text-onSurfaceVariant uppercase">RAM</div><div id="stat-ram" class="text-lg font-bold text-primaryContainer font-mono">--</div></div>
<div class="glass p-4 rounded-xl text-center"><div class="text-[10px] text-onSurfaceVariant uppercase">RED</div><div id="stat-net" class="text-lg font-bold text-tertiaryContainer font-mono">--</div></div>
</div>
</section>
<!-- Right: history + stats -->
<section class="xl:col-span-2 space-y-6">
<!-- preview -->
<div id="preview" class="glass p-6 rounded-2xl hidden">
<div class="flex gap-4">
<img id="pv-thumb" class="w-40 aspect-video rounded-xl object-cover border border-white/10"/>
<div class="flex-1">
<h4 id="pv-title" class="text-lg font-semibold text-onSurface"></h4>
<p id="pv-meta" class="text-xs text-onSurfaceVariant font-mono mt-1"></p>
</div>
</div>
</div>

<!-- Stats 30d -->
<div class="glass p-6 rounded-2xl">
<div class="flex justify-between items-center mb-4"><h3 class="text-primary text-sm uppercase tracking-widest">Uso do Docker (30 dias)</h3><span id="stats-range" class="text-xs text-onSurfaceVariant font-mono"></span></div>
<div class="grid grid-cols-3 gap-4 mb-4">
<div class="text-center"><div class="text-[10px] text-onSurfaceVariant uppercase">CPU méd</div><div id="avg-cpu" class="text-xl font-bold text-primary font-mono">--</div></div>
<div class="text-center"><div class="text-[10px] text-onSurfaceVariant uppercase">RAM méd</div><div id="avg-ram" class="text-xl font-bold text-primaryContainer font-mono">--</div></div>
<div class="text-center"><div class="text-[10px] text-onSurfaceVariant uppercase">Rede ↓</div><div id="avg-net" class="text-xl font-bold text-tertiaryContainer font-mono">--</div></div>
</div>
<canvas id="chart" height="120" class="w-full"></canvas>
</div>

<!-- History -->
<div class="glass rounded-2xl overflow-hidden">
<div class="px-6 py-4 border-b border-white/10 flex justify-between items-center"><h3 class="text-onSurface text-sm uppercase tracking-widest">Histórico (máx 100)</h3><div class="flex items-center gap-2"><span id="hist-count" class="text-xs text-onSurfaceVariant font-mono"></span><button onclick="refreshHistory()" class="material-symbols-outlined text-onSurfaceVariant hover:text-primary">refresh</button></div></div>
<div class="max-h-[420px] overflow-y-auto custom-scroll">
<div id="hist-list" class="divide-y divide-white/5"></div>
</div>
</div>
</section>
</div>
</main>

<div id="toast" class="fixed top-20 right-6 z-[100] opacity-0 pointer-events-none max-w-xs px-4 py-3 rounded-lg border text-sm"></div>
<script>
renderLogo('horizontal','md',document.getElementById('logo'));
renderLogo('horizontal','sm',document.getElementById('logo-side'));

let selectedFmt='mp4', currentInfo=null, debounceTimer=null, maxHeight=0;

function selectFmt(f){ selectedFmt=f;
  document.getElementById('btn-mp4').className = f==='mp4'?'py-2 bg-primaryContainer text-onPrimaryContainer font-bold rounded text-sm':'py-2 text-onSurfaceVariant rounded text-sm';
  document.getElementById('btn-mp3').className = f==='mp3'?'py-2 bg-primaryContainer text-onPrimaryContainer font-bold rounded text-sm':'py-2 text-onSurfaceVariant rounded text-sm';
  buildQualityOptions();
}
function buildQualityOptions(){
  const wrap=document.getElementById('quality-wrap'), sel=document.getElementById('quality');
  sel.innerHTML='';
  if(selectedFmt==='mp3'){
    wrap.classList.remove('hidden');
    [['320','MP3 320 kbps (melhor)'],['192','MP3 192 kbps (padrão)'],['128','MP3 128 kbps (menor)']].forEach(([v,t])=>{
      const o=document.createElement('option'); o.value=v; o.textContent=t; if(v==='192')o.selected=true; sel.appendChild(o);
    });
  } else {
    wrap.classList.remove('hidden');
    if(!currentInfo||!currentInfo.formats||!currentInfo.formats.length){
      const o=document.createElement('option'); o.value='0'; o.textContent='MP4 melhor qualidade'; sel.appendChild(o); return;
    }
    const hs=currentInfo.formats.map(f=>f.height);
    maxHeight=Math.max(...hs);
    // monta opcoes: do maximo descendo (4K/1080/720/480) conforme disponivel
    const tier=[2160,1440,1080,720,480,360];
    const avail=[...new Set(hs)].sort((a,b)=>b-a);
    const opts=[];
    if(maxHeight>=2160) opts.push(['2160','MP4 4K (2160p)']);
    if(maxHeight>=1080) opts.push(['1080','MP4 1080p']);
    if(maxHeight>=720) opts.push(['720','MP4 720p']);
    if(maxHeight>=480) opts.push(['480','MP4 480p']);
    if(maxHeight>=360 && !opts.length) opts.push(['360','MP4 360p']);
    // garante que a maior disponivel apareca
    if(!opts.find(o=>o[0]==String(maxHeight))) opts.unshift([String(maxHeight),'MP4 '+maxHeight+'p (máx)']);
    opts.forEach(([v,t])=>{ const o=document.createElement('option'); o.value=v; o.textContent=t; if(v===opts[0][0])o.selected=true; sel.appendChild(o); });
  }
}
function showToast(msg,err){ const t=document.getElementById('toast');
  t.textContent=msg; t.className='fixed top-20 right-6 z-[100] max-w-xs px-4 py-3 rounded-lg border text-sm '+(err?'bg-errorContainer text-onError':'bg-surfaceVariant text-onSurface');
  t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',3500);
}
async function logout(){ document.cookie='auth_session=; expires=Thu,01 Jan 1970 00:00:00 UTC; path=/;'; location.href='/login'; }

async function autoAnalyze(){
  const url=document.getElementById('url-input').value.trim();
  if(!url || !/^https?:\/\//.test(url)){ document.getElementById('preview').classList.add('hidden'); return; }
  try{
    const r=await fetch('/api/info?url='+encodeURIComponent(url)); const d=await r.json();
    if(r.ok){ currentInfo=d;
      const p=document.getElementById('preview'); p.classList.remove('hidden');
      document.getElementById('pv-thumb').src=d.thumbnail||''; document.getElementById('pv-title').textContent=d.title||'--';
      const dur=d.duration?Math.floor(d.duration/60)+'m'+(d.duration%60)+'s':'--';
      document.getElementById('pv-meta').textContent=(d.uploader||'')+' • '+dur+' • '+(d.view_count?d.view_count.toLocaleString('pt-BR')+' views':'');
      buildQualityOptions();
      // transcrição?
      if(document.getElementById('chk-transcript').checked) checkTranscript(url);
    }
  }catch(e){}
}
document.getElementById('url-input').addEventListener('input',()=>{
  clearTimeout(debounceTimer); debounceTimer=setTimeout(autoAnalyze,700);
});
document.getElementById('chk-transcript').addEventListener('change',()=>{
  const url=document.getElementById('url-input').value.trim();
  if(document.getElementById('chk-transcript').checked && url) checkTranscript(url);
  else document.getElementById('transcript-info').classList.add('hidden');
});
async function checkTranscript(url){
  try{ const r=await fetch('/api/transcript?url='+encodeURIComponent(url)); const d=await r.json();
    const box=document.getElementById('transcript-info');
    if(d.available){ box.classList.remove('hidden'); document.getElementById('tr-lang').textContent=(d.lang||'').toUpperCase(); }
    else box.classList.add('hidden');
  }catch(e){}
}

function setProgress(show,text,pct){
  const p=document.getElementById('progress');
  if(!show){ p.classList.add('hidden'); return; }
  p.classList.remove('hidden');
  document.getElementById('prog-text').textContent=text||'Processando...';
  document.getElementById('prog-bar').style.width=(pct||30)+'%';
}
async function startDownload(){
  const url=document.getElementById('url-input').value.trim();
  if(!url){showToast('Informe a URL.',true);return;}
  const btn=document.getElementById('dl-btn'); btn.disabled=true;
  setProgress(true,'Iniciando conversão...',15);
  try{
    const q=selectedFmt==='mp3'?document.getElementById('quality').value:document.getElementById('quality').value;
    // dispara o stream (download direto, sem salvar no servidor)
    const a=document.createElement('a'); a.href='/stream?url='+encodeURIComponent(url)+'&fmt='+selectedFmt+'&q='+q;
    a.download=''; document.body.appendChild(a); a.click(); a.remove();
    setProgress(true,'Convertendo e enviando...',60);
    setTimeout(()=>{ setProgress(true,'Conversão pronta ✓',100); showToast('Download concluído — arquivo salvo.'); },2500);
    setTimeout(()=>{ setProgress(false); refreshHistory(); },3500);
  }catch(e){showToast('Erro: '+e.message,true); setProgress(false);}
  finally{ setTimeout(()=>{btn.disabled=false;},1500); }
}

function fmtSize(b){ if(!b||b===0)return'--'; const u=['B','KB','MB','GB']; let v=b,i=0; while(v>=1024&&i<3){v/=1024;i++;} return v.toFixed(1)+' '+u[i]; }
function fmtAgo(ts){ if(!ts)return'--'; const d=new Date(ts*1000),now=Date.now(),diff=Math.floor((now-d)/1000);
  if(diff<60)return diff+'s'; if(diff<3600)return Math.floor(diff/60)+'m'; if(diff<86400)return Math.floor(diff/3600)+'h'; return d.toLocaleDateString('pt-BR'); }
function statusChip(s){ s=(s||'').toLowerCase();
  if(s==='completed')return '<span class="text-tertiaryContainer text-xs font-mono">✓ CONCLUÍDO</span>';
  if(s==='failed')return '<span class="text-error text-xs font-mono">✗ FALHOU</span>';
  return '<span class="text-primary text-xs font-mono">'+s.toUpperCase()+'</span>'; }

async function refreshHistory(){
  try{ const r=await fetch('/api/history',{credentials:'include'}); const items=await r.json();
    document.getElementById('hist-count').textContent=items.length+' itens';
    const box=document.getElementById('hist-list');
    if(!items.length){box.innerHTML='<div class="px-4 py-8 text-center text-onSurfaceVariant">Nenhum download ainda</div>';return;}
    box.innerHTML=items.map(i=>`<div class="flex items-center gap-3 px-4 py-3 hover:bg-white/5">
      <img src="${i.thumbnail||''}" onerror="this.style.display='none'" class="w-14 aspect-video rounded object-cover border border-white/10 flex-shrink-0"/>
      <div class="flex-1 min-w-0">
        <div class="text-onSurface text-sm truncate" title="${i.title||i.url||''}">${i.title||i.url||'--'}</div>
        <div class="text-[10px] text-onSurfaceVariant font-mono mt-0.5">${(i.format||'--').toUpperCase()} ${i.quality?('· '+i.quality+'p'):''} · ${fmtSize(i.size)} · ${fmtAgo(i.timestamp)}</div>
      </div>
      <div class="flex-shrink-0">${statusChip(i.status)}</div>
    </div>`).join('');
  }catch(e){}
}
function fmtSpeed(bps){ if(!bps)return'0 B/s'; if(bps<1024)return Math.round(bps)+' B/s'; if(bps<1048576)return (bps/1024).toFixed(1)+' KB/s'; return (bps/1048576).toFixed(1)+' MB/s'; }

async function refreshStats(){
  try{ const r=await fetch('/api/stats',{credentials:'include'}); const d=await r.json();
    const cur=d.current;
    if(cur){ document.getElementById('stat-cpu').textContent=cur.cpu+'%';
      document.getElementById('stat-ram').textContent=(cur.ram_used_mb/1024).toFixed(1)+'G';
      document.getElementById('stat-net').textContent=(cur.net_recv_mbps).toFixed(0)+'MB';
      document.getElementById('avg-cpu').textContent=avg(d.daily.map(x=>x.cpu_avg))+'%';
      document.getElementById('avg-ram').textContent=avg(d.daily.map(x=>x.ram_avg_pct))+'%';
      document.getElementById('avg-net').textContent=sum(d.daily.map(x=>x.net_recv_gb)).toFixed(1)+'G';
      document.getElementById('stats-range').textContent=d.daily.length+' dias';
    }
    drawChart(d.points||[]);
  }catch(e){}
}
function avg(a){ return a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):'--'; }
function sum(a){ return a.reduce((x,y)=>x+y,0); }

function drawChart(points){
  const c=document.getElementById('chart'); const ctx=c.getContext('2d');
  const w=c.width=c.clientWidth, h=120; c.height=h;
  ctx.clearRect(0,0,w,h);
  if(points.length<2)return;
  const cpu=points.map(p=>p.cpu), ram=points.map(p=>p.ram_pct);
  const max=100;
  const drawLine=(arr,color)=>{ ctx.beginPath(); arr.forEach((v,i)=>{const x=i/(arr.length-1)*w,y=h-(v/max)*h; i?ctx.lineTo(x,y):ctx.moveTo(x,y);});
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke(); };
  drawLine(cpu,'#00f0ff'); drawLine(ram,'#7000ff');
}

async function refreshNetwork(){
  try{ const r=await fetch('/api/stats',{credentials:'include'}); const d=await r.json();
    const s=d.current; if(!s)return;
    if(prevNet){ const dt=5; document.getElementById('net-down').textContent='↓ '+fmtSpeed(s.net_recv_mbps*1048576/dt);
      document.getElementById('net-up').textContent='↑ '+fmtSpeed(s.net_sent_mbps*1048576/dt); }
    prevNet=s;
  }catch(e){}
}
let prevNet=null;

selectFmt('mp4');
refreshHistory(); refreshStats();
setInterval(refreshHistory,8000); setInterval(refreshStats,10000); setInterval(refreshNetwork,5000);
</script>
</body></html>
