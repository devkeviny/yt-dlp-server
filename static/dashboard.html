<!DOCTYPE html>
<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lulu Converter | Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
.glass-panel{background:rgba(19,19,19,0.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.05)}
.neon-glow{box-shadow:0 0 20px rgba(255,105,180,0.15)}
.shimmer{background:linear-gradient(90deg,#1A1A1A 25%,#252525 50%,#1A1A1A 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.progress-pulse{background:linear-gradient(90deg,#ff69b4,#c71585);background-size:200% 200%;animation:pulse-gradient 2s ease infinite}
@keyframes pulse-gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0e0e0e}::-webkit-scrollbar-thumb{background:#3b494b;border-radius:3px}
</style>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{
"primary":"#ffb6c1","primary-container":"#ff69b4","on-primary-fixed":"#3a0020","primary-fixed-dim":"#ff1493",
"on-primary":"#5c0033","surface":"#131313","background":"#131313","on-surface":"#e5e2e1",
"surface-dim":"#131313","surface-container-lowest":"#0e0e0e","surface-container-low":"#1c1b1b",
"surface-container":"#201f1f","surface-container-high":"#2a2a2a","surface-container-highest":"#353534",
"on-surface-variant":"#b9cacb","secondary":"#ff91a4","secondary-container":"#c71585",
"tertiary-container":"#00f990","error":"#ffb4ab","error-container":"#93000a",
"outline":"#849495","outline-variant":"#3b494b"
}}}}}</script>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen selection:bg-primary-container selection:text-on-primary-container">
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 md:px-16 h-20 bg-surface/60 backdrop-blur-md border-b border-white/10">
<div class="flex items-center gap-3"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='20' fill='%23ff69b4'/%3E%3Ctext x='20' y='27' text-anchor='middle' font-size='24'%3E%F0%9F%90%B1%3C/text%3E%3C/svg%3E" alt="Lulu" class="w-10 h-10 rounded-full shadow-[0_0_15px_rgba(255,105,180,0.3)]"/><span class="text-2xl font-bold text-primary tracking-tighter">Lulu Converter</span></div>
<nav class="hidden md:flex items-center gap-8">
<a href="/dashboard" class="text-sm text-primary border-b-2 border-primary pb-1">Dashboard</a>
<a href="/transfers" class="text-sm text-on-surface-variant hover:text-primary transition-colors">Transfers</a>
<a href="/storage" class="text-sm text-on-surface-variant hover:text-primary transition-colors">Storage</a>
<a href="/system" class="text-sm text-on-surface-variant hover:text-primary transition-colors">System</a>
</nav>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">sensors</span>
<a href="/" onclick="document.cookie='session=;max-age=0';" class="material-symbols-outlined text-on-surface-variant hover:text-error transition-colors">logout</a>
</div>
</header>
<main class="pt-24 pb-20 px-6 md:px-16 min-h-screen">
<div class="max-w-5xl mx-auto">
<section class="text-center py-12">
<h1 class="text-4xl md:text-5xl font-bold tracking-tighter text-on-surface mb-4">Conversão de Mídia</h1>
<p class="text-on-surface-variant max-w-xl mx-auto">Insira a URL do vídeo para analisar e baixar.</p>
<div class="max-w-3xl mx-auto mt-8 glass-panel p-4 rounded-2xl flex flex-col md:flex-row gap-4">
<div class="flex-1 relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">link</span>
<input id="urlInput" class="w-full bg-surface-container-high border-0 rounded-xl pl-12 pr-4 py-5 text-on-surface focus:ring-2 focus:ring-primary-container/50 transition-all" placeholder="URL do YouTube, Vimeo..." type="text"/>
</div>
<button id="analyzeBtn" class="bg-primary-container text-white font-bold px-10 py-5 rounded-xl hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2 neon-glow">
Analisar <span class="material-symbols-outlined">analytics</span>
</button>
</div>
</section>
<div id="resultArea" class="space-y-6 hidden">
<div class="glass-panel p-8 rounded-3xl grid grid-cols-1 md:grid-cols-12 gap-8">
<div class="md:col-span-5"><div class="aspect-video rounded-2xl overflow-hidden border border-white/5 bg-surface-container-high">
<img id="thumb" class="w-full h-full object-cover" src="" alt="Thumbnail"/></div></div>
<div class="md:col-span-7 flex flex-col justify-between space-y-4">
<div><h2 id="vidTitle" class="text-2xl font-bold leading-tight">--</h2><p id="vidDuration" class="text-sm text-on-surface-variant"></p></div>
<div class="grid grid-cols-2 gap-4">
<div><label class="text-xs text-on-surface-variant/60 block mb-1">FORMATO</label>
<div class="flex bg-surface-container-high p-1 rounded-xl">
<button id="fmtMp4" class="flex-1 py-2 rounded-lg bg-primary-container text-white font-bold text-sm">MP4</button>
<button id="fmtMp3" class="flex-1 py-2 rounded-lg text-on-surface-variant text-sm">MP3</button>
</div></div>
<div><label class="text-xs text-on-surface-variant/60 block mb-1">REDE</label>
<div class="flex bg-surface-container-high p-1 rounded-xl">
<button id="netAuto" class="flex-1 py-2 rounded-lg bg-primary-container text-white font-bold text-sm">Auto</button>
<button id="netGlobal" class="flex-1 py-2 rounded-lg text-on-surface-variant text-sm">Global</button>
</div></div>
</div>
<button id="downloadBtn" class="w-full py-4 bg-primary-container text-white font-bold rounded-xl flex items-center justify-center gap-2 hover:opacity-90 transition-all">
INICIAR DOWNLOAD <span class="material-symbols-outlined">download</span>
</button>
</div></div></div></div>
</main>
<script>
let currentFmt='mp4',currentNet='auto';
document.getElementById('fmtMp4').onclick=function(){currentFmt='mp4';document.querySelectorAll('[id^=fmt]').forEach(b=>{b.className='flex-1 py-2 rounded-lg text-on-surface-variant text-sm'});this.className='flex-1 py-2 rounded-lg bg-primary-container text-white font-bold text-sm'};
document.getElementById('fmtMp3').onclick=function(){currentFmt='mp3';document.querySelectorAll('[id^=fmt]').forEach(b=>{b.className='flex-1 py-2 rounded-lg text-on-surface-variant text-sm'});this.className='flex-1 py-2 rounded-lg bg-primary-container text-white font-bold text-sm'};
document.getElementById('netAuto').onclick=function(){currentNet='auto';document.querySelectorAll('[id^=net]').forEach(b=>{b.className='flex-1 py-2 rounded-lg text-on-surface-variant text-sm'});this.className='flex-1 py-2 rounded-lg bg-primary-container text-white font-bold text-sm'};
document.getElementById('netGlobal').onclick=function(){currentNet='global';document.querySelectorAll('[id^=net]').forEach(b=>{b.className='flex-1 py-2 rounded-lg text-on-surface-variant text-sm'});this.className='flex-1 py-2 rounded-lg bg-primary-container text-white font-bold text-sm'};
document.getElementById('analyzeBtn').onclick=async function(){const url=document.getElementById('urlInput').value;if(!url)return alert('Insira uma URL');this.disabled=true;this.innerHTML='<span class="material-symbols-outlined animate-spin">sync</span> Analisando...';try{const r=await fetch('/info?url='+encodeURIComponent(url)+'&net='+currentNet);const d=await r.json();if(r.ok){document.getElementById('vidTitle').textContent=d.title;document.getElementById('vidDuration').textContent=d.duration||'';document.getElementById('thumb').src=d.thumbnail||'https://via.placeholder.com/640x360';document.getElementById('resultArea').classList.remove('hidden');document.getElementById('downloadBtn').onclick=function(){window.location.href='/download?url='+encodeURIComponent(url)+'&fmt='+currentFmt+'&net='+currentNet}}else alert(d.detail||'Erro')}catch(e){alert('Erro de conexão')}finally{this.disabled=false;this.innerHTML='Analisar <span class="material-symbols-outlined">analytics</span>'}};
</script>
</body></html>
