<!DOCTYPE html>
<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MEDIA_CORE_V1 | Transfers</title>
<meta name="stitch-api-key" content="STITCH_API_KEY_PLACEHOLDER"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tw-config">tailwind.config={darkMode:"class",theme:{extend:{colors:{surface:"#131313",surfaceContainerLowest:"#0e0e0e",surfaceVariant:"#353534",surfaceContainerLow:"#1c1b1b",onSurface:"#e5e2e1",onSurfaceVariant:"#b9cacb",primary:"#dbfcff",primaryContainer:"#00f0ff",onPrimaryContainer:"#00363a",secondaryContainer:"#7000ff",tertiaryContainer:"#00f990",outlineVariant:"#3b494b",error:"#ffb4ab"},fontFamily:{body:["Inter"],mono:["JetBrains Mono"]}}}};</script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400;vertical-align:middle}body{background:#131313;color:#e5e2e1;font-family:Inter,sans-serif;margin:0}.glass{background:rgba(19,19,19,.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08)}.custom-scroll::-webkit-scrollbar{width:6px}.custom-scroll::-webkit-scrollbar-thumb{background:#3b494b;border-radius:3px}</style>
</head>
<body class="min-h-screen">
<script>(async function(){try{const me=await fetch('/api/me',{credentials:'include'});if(!me.ok)location.href='/login';}catch(e){location.href='/login';}})();</script>
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 lg:px-16 h-20 bg-surface/60 backdrop-blur-md border-b border-white/10">
<div class="font-bold text-primary tracking-tighter text-xl">MEDIA_CORE_V1</div>
<nav class="hidden md:flex gap-8 text-sm"><a class="text-onSurfaceVariant hover:text-primary cursor-pointer" href="/">Dashboard</a><a class="text-primary border-b-2 border-primary pb-1" href="/transfers">Transfers</a><a class="text-onSurfaceVariant hover:text-primary cursor-pointer" href="/storage">Storage</a><a class="text-onSurfaceVariant hover:text-primary cursor-pointer" href="/system">System</a></nav>
<button onclick="logout()" class="material-symbols-outlined text-onSurfaceVariant hover:text-primary">logout</button>
</header>
<aside class="fixed left-0 top-0 h-full pt-20 flex flex-col bg-surfaceContainerLowest/80 backdrop-blur-xl border-r border-white/10 w-64 hidden lg:flex">
<div class="p-6 flex items-center gap-3"><div class="w-9 h-9 rounded-lg bg-primaryContainer/20 flex items-center justify-center"><span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1">terminal</span></div><div><div class="text-xs text-primary font-mono">NODE_01</div><div class="text-[10px] text-onSurfaceVariant uppercase">Online</div></div></div>
<nav class="flex-1 px-4 py-6 space-y-2"><a class="flex items-center gap-4 px-4 py-3 rounded-lg text-onSurfaceVariant hover:bg-surfaceVariant/30" href="/"><span class="material-symbols-outlined">dashboard</span>Home</a><a class="flex items-center gap-4 px-4 py-3 rounded-lg bg-primaryContainer/20 text-primary border-r-4 border-primary" href="/transfers"><span class="material-symbols-outlined">download</span>Transfers</a><a class="flex items-center gap-4 px-4 py-3 rounded-lg text-onSurfaceVariant hover:bg-surfaceVariant/30" href="/storage"><span class="material-symbols-outlined">database</span>Storage</a><a class="flex items-center gap-4 px-4 py-3 rounded-lg text-onSurfaceVariant hover:bg-surfaceVariant/30" href="/system"><span class="material-symbols-outlined">settings</span>System</a></nav>
<div class="p-4"><button onclick="logout()" class="w-full py-3 bg-primaryContainer text-onPrimaryContainer font-bold rounded-xl active:scale-95 transition-all flex items-center justify-center gap-2"><span class="material-symbols-outlined">logout</span>Sair</button></div>
</aside>
<main class="lg:pl-64 pt-24 pb-16 px-6 max-w-7xl mx-auto space-y-6">
<div class="glass p-6 rounded-2xl"><div class="flex justify-between items-center mb-4"><h3 class="text-primary text-sm uppercase tracking-widest">Fila Ativa</h3><button onclick="refresh()" class="material-symbols-outlined text-onSurfaceVariant hover:text-primary">refresh</button></div>
<div id="active" class="space-y-3"><div class="text-center text-onSurfaceVariant py-8">Nenhum download ativo</div></div></div>
<div class="glass rounded-2xl overflow-hidden"><div class="px-6 py-4 border-b border-white/10 flex justify-between items-center"><h3 class="text-onSurface text-sm uppercase tracking-widest">Archive (Histórico • máx 100)</h3><span id="cnt" class="text-xs text-onSurfaceVariant font-mono"></span></div>
<div class="max-h-[500px] overflow-y-auto custom-scroll"><table class="w-full text-left"><thead class="bg-surfaceContainerLow sticky top-0"><tr class="text-[10px] text-onSurfaceVariant uppercase font-mono"><th class="px-4 py-3">Status</th><th class="px-4 py-3">Título</th><th class="px-4 py-3">Fmt</th><th class="px-4 py-3">Tam</th><th class="px-4 py-3">Tempo</th><th class="px-4 py-3">Plat</th><th class="px-4 py-3">Quando</th></tr></thead><tbody id="tb" class="divide-y divide-white/5 text-sm"></tbody></table></div></div>
</main>
<script>
function logout(){document.cookie='auth_session=; expires=Thu,01 Jan 1970 00:00:00 UTC; path=/;';location.href='/login';}
function fmtSize(b){if(!b)return'--';const u=['B','KB','MB','GB'];let v=b,i=0;while(v>=1024&&i<3){v/=1024;i++;}return v.toFixed(1)+' '+u[i];}
function fmtAgo(ts){if(!ts)return'--';const d=new Date(ts*1000),n=Date.now(),x=Math.floor((n-d)/1000);if(x<60)return x+'s';if(x<3600)return Math.floor(x/60)+'m';if(x<86400)return Math.floor(x/3600)+'h';return d.toLocaleDateString('pt-BR');}
function chip(s){s=(s||'').toLowerCase();if(s==='completed')return'<span class="text-tertiaryContainer text-xs font-mono">✓ OK</span>';if(s==='failed')return'<span class="text-error text-xs font-mono">✗ FALHOU</span>';return'<span class="text-primary text-xs font-mono">'+(s||'?').toUpperCase()+'</span>';}
async function refresh(){try{const r=await fetch('/api/history',{credentials:'include'});const items=await r.json();document.getElementById('cnt').textContent=items.length+' itens';const tb=document.getElementById('tb');if(!items.length){tb.innerHTML='<tr><td colspan="7" class="px-4 py-8 text-center text-onSurfaceVariant">Vazio</td></tr>';return;}tb.innerHTML=items.map(i=>`<tr class="hover:bg-white/5"><td class="px-4 py-3">${chip(i.status)}</td><td class="px-4 py-3 max-w-[220px] truncate">${i.title||i.url||'--'}</td><td class="px-4 py-3 font-mono text-onSurfaceVariant">${(i.format||'--').toUpperCase()}</td><td class="px-4 py-3 font-mono text-onSurfaceVariant">${fmtSize(i.size)}</td><td class="px-4 py-3 font-mono text-onSurfaceVariant">${i.duration_s?i.duration_s+'s':'--'}</td><td class="px-4 py-3 font-mono text-onSurfaceVariant">${i.platform||'--'}</td><td class="px-4 py-3 font-mono text-onSurfaceVariant">${fmtAgo(i.timestamp)}</td></tr>`).join('');}catch(e){}}
refresh();setInterval(refresh,8000);
</script>
</body></html>
